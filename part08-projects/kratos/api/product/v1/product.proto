syntax = "proto3";

package api.product.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "kratos/api/product/v1;v1";

// 商品服务
service ProductService {
  // 创建商品
  rpc CreateProduct (CreateProductRequest) returns (Product) {
    option (google.api.http) = {
      post: "/api/v1/products"
      body: "*"
    };
  }
  
  // 获取商品
  rpc GetProduct (GetProductRequest) returns (Product) {
    option (google.api.http) = {
      get: "/api/v1/products/{id}"
    };
  }
  
  // 更新商品
  rpc UpdateProduct (UpdateProductRequest) returns (Product) {
    option (google.api.http) = {
      put: "/api/v1/products/{id}"
      body: "*"
    };
  }
  
  // 删除商品
  rpc DeleteProduct (DeleteProductRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/products/{id}"
    };
  }
  
  // 商品列表
  rpc ListProduct (ListProductRequest) returns (ListProductReply) {
    option (google.api.http) = {
      get: "/api/v1/products"
    };
  }
  
  // 扣减库存
  rpc DeductStock (DeductStockRequest) returns (DeductStockReply) {
    option (google.api.http) = {
      post: "/api/v1/products/deduct"
      body: "*"
    };
  }
}

// 商品
message Product {
  int64 id = 1;
  string name = 2;
  string description = 3;
  string category = 4;
  double price = 5;
  int32 stock = 6;
  string image_url = 7;
  int32 status = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

// 创建商品请求
message CreateProductRequest {
  string name = 1;
  string description = 2;
  string category = 3;
  double price = 4;
  int32 stock = 5;
  string image_url = 6;
}

// 获取商品请求
message GetProductRequest {
  int64 id = 1;
}

// 更新商品请求
message UpdateProductRequest {
  int64 id = 1;
  string name = 2;
  string description = 3;
  string category = 4;
  double price = 5;
  int32 stock = 6;
  string image_url = 7;
  int32 status = 8;
}

// 删除商品请求
message DeleteProductRequest {
  int64 id = 1;
}

// 商品列表请求
message ListProductRequest {
  int32 page = 1;
  int32 page_size = 2;
  string category = 3;
  string keyword = 4;
}

// 商品列表响应
message ListProductReply {
  repeated Product products = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

// 扣减库存请求
message DeductStockRequest {
  int64 product_id = 1;
  int32 quantity = 2;
}

// 扣减库存响应
message DeductStockReply {
  bool success = 1;
  string message = 2;
  int32 remaining_stock = 3;
}