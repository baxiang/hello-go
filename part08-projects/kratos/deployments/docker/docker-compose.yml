version: '3.8'

services:
  # NATS 消息队列
  nats:
    image: nats:latest
    container_name: kratos-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]
    networks:
      - kratos-network

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: kratos-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ecommerce
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - kratos-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: kratos-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - kratos-network

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:latest
    container_name: kratos-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - kratos-network

  # Jaeger 链路追踪
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: kratos-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: true
      SPAN_STORAGE_TYPE: badger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - kratos-network

networks:
  kratos-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data: